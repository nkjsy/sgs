<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGS 单机版 Web</title>
  </head>
  <body>
    <div id="app">正在加载 SGS Web...</div>
    <script>
      window.__SGS_APP_BOOTED = false;
      window.setTimeout(() => {
        if (window.__SGS_APP_BOOTED) {
          return;
        }

        const app = document.getElementById("app");
        if (!app) {
          return;
        }

        const currentUrl = window.location.href;
        app.innerHTML = `
          <main style="max-width: 920px; margin: 24px auto; padding: 12px; font-family: 'Microsoft YaHei', Arial, sans-serif; color: #1d2433;">
            <h1 style="font-size: 18px; margin: 0 0 12px;">SGS Web 未成功启动</h1>
            <p style="margin: 0 0 8px; color: #4b556b;">当前地址：${currentUrl}</p>
            <p style="margin: 0 0 8px; color: #4b556b;">请确认你打开的是终端输出的 Vite 地址（例如 http://localhost:5174），不要直接打开本地 index.html 文件。</p>
            <p style="margin: 0; color: #4b556b;">如果仍失败，请打开浏览器控制台（F12）查看首条红色报错并发给我。</p>
          </main>
        `;
      }, 1200);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
